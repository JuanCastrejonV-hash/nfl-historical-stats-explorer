<!DOCTYPE html>
<html>
<head>
    <title>NFL Historical Stats Explorer</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        header {
            background: linear-gradient(135deg, #013369, #d50a0a);
            padding: 42px 20px;
            text-align: center;
            border-bottom: 4px solid #020617;
        }

        header h1 {
            margin: 0;
            font-size: 44px;
        }

        header p {
            margin-top: 12px;
            font-size: 18px;
            opacity: 0.95;
        }

        .container {
            width: 90%;
            max-width: 1500px;
            margin: auto;
            padding: 30px 0;
        }

        .panel {
            background: #111827;
            padding: 24px;
            border-radius: 18px;
            margin-bottom: 28px;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.35);
            border: 1px solid #1f2937;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 14px;
            margin-top: 15px;
        }

        .stat-box {
            background: #1e293b;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid #334155;
            min-width: 0;
        }

        .stat-box h2 {
            margin: 0;
            color: #38bdf8;
            font-size: clamp(22px, 2vw, 30px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-box p {
            margin-bottom: 0;
            color: #cbd5e1;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        input, select {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
        }

        input {
            min-width: 300px;
        }

        button {
            padding: 14px 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .red {
            background: #dc2626;
        }

        .red:hover {
            background: #b91c1c;
        }

        .green {
            background: #16a34a;
        }

        .green:hover {
            background: #15803d;
        }

        .gray {
            background: #334155;
        }

        .gray:hover {
            background: #475569;
        }

        .yellow {
            background: #ca8a04;
        }

        .yellow:hover {
            background: #a16207;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
        }

        .section-title h2 {
            margin: 0;
        }

        .count-pill {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 999px;
            color: #cbd5e1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 18px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #334155;
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.28);
        }

        .card h3 {
            margin-top: 0;
            font-size: 20px;
            color: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 8px;
            background: #334155;
            color: white;
            font-weight: bold;
        }

        .score {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
            margin: 10px 0;
        }

        .small {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.5;
        }

        .muted {
            color: #94a3b8;
        }

        .error {
            background: #7f1d1d;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #ef4444;
        }
    </style>
</head>

<body>

<header>
    <h1>NFL Historical Stats Explorer</h1>
    <p>Consulta estadísticas históricas de NFL desde MySQL usando Node/Express y una API JSON.</p>
</header>

<div class="container">

    <div class="panel" id="stats">
        <h2>Database Stats</h2>
        <p>Loading stats...</p>
    </div>

    <div class="panel">
        <div class="controls">
            <input id="searchInput" placeholder="Search team, e.g. Chiefs, Eagles, Cowboys">

            <select id="seasonSelect">
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
            </select>

            <button onclick="searchTeams()">Search Teams</button>
            <button onclick="searchGames()">Search Games</button>
            <button class="green" onclick="loadTeams('/teams/top-wins', 'Top Teams by Wins')">Top Wins</button>
            <button class="yellow" onclick="loadTeams('/teams/top-offenses', 'Top Offenses')">Top Offenses</button>
            <button class="red" onclick="loadTeams('/teams/top-defenses', 'Top Defenses')">Top Defenses</button>
            <button onclick="loadTeams('/teams/best-differential', 'Best Point Differential')">Best Differential</button>
            <button class="gray" onclick="loadGames('/games/season/' + document.getElementById('seasonSelect').value, 'Games by Season')">Games by Season</button>
            <button class="green" onclick="loadGames('/games/high-scoring', 'Highest Scoring Games')">High Scoring Games</button>
            <button class="yellow" onclick="loadGames('/games/close-games', 'Closest Games')">Close Games</button>
        </div>
    </div>

    <div class="section-title">
        <h2 id="sectionTitle">Results</h2>
        <span class="count-pill" id="resultCount">0 results</span>
    </div>

    <div class="grid" id="results"></div>

</div>

<script>
const API_URL = "http://localhost:3000/api";

function escapeHTML(value) {
    if (value === null || value === undefined) {
        return "N/A";
    }

    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatNumber(value) {
    const number = Number(value || 0);

    return number.toLocaleString(undefined, {
        maximumFractionDigits: 2
    });
}

function formatDate(value) {
    if (!value) {
        return "N/A";
    }

    return String(value).replace("T", " ");
}

async function loadStats() {
    try {
        const response = await fetch(API_URL + "/stats");
        const stats = await response.json();

        document.getElementById("stats").innerHTML = `
            <h2>Database Stats</h2>

            <div class="stats-grid">
                <div class="stat-box">
                    <h2>${formatNumber(stats.total_team_seasons)}</h2>
                    <p>Team Seasons</p>
                </div>

                <div class="stat-box">
                    <h2>${formatNumber(stats.total_games)}</h2>
                    <p>Total Games</p>
                </div>

                <div class="stat-box">
                    <h2>${formatNumber(stats.total_seasons)}</h2>
                    <p>Seasons</p>
                </div>

                <div class="stat-box">
                    <h2>${formatNumber(stats.total_teams)}</h2>
                    <p>Teams</p>
                </div>

                <div class="stat-box">
                    <h2>${formatNumber(stats.average_total_points)}</h2>
                    <p>Average Game Points</p>
                </div>

                <div class="stat-box">
                    <h2>${formatNumber(stats.highest_total_points)}</h2>
                    <p>Highest Game Points</p>
                </div>
            </div>
        `;
    } catch (error) {
        document.getElementById("stats").innerHTML = `
            <h2>Database Stats</h2>
            <div class="error">
                Could not load stats. Make sure <b>node index.js</b> is running inside the backend folder.
            </div>
        `;
    }
}

async function loadTeams(endpoint, title) {
    document.getElementById("sectionTitle").innerText = "Loading...";
    document.getElementById("resultCount").innerText = "Loading...";
    document.getElementById("results").innerHTML = "";

    try {
        const response = await fetch(API_URL + endpoint);
        const data = await response.json();

        document.getElementById("sectionTitle").innerText = title;
        document.getElementById("resultCount").innerText = data.length + " results";

        const results = document.getElementById("results");
        results.innerHTML = "";

        if (data.length === 0) {
            results.innerHTML = `<p class="muted">No results found.</p>`;
            return;
        }

        data.forEach(team => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${escapeHTML(team.team)}</h3>

                <span class="badge">${escapeHTML(team.season)}</span>
                <span class="badge">${escapeHTML(team.conference)}</span>

                <p class="small"><b>Record:</b> ${escapeHTML(team.wins)} - ${escapeHTML(team.losses)} - ${escapeHTML(team.ties)}</p>
                <p class="small"><b>Points For:</b> ${formatNumber(team.points_for)}</p>
                <p class="small"><b>Points Against:</b> ${formatNumber(team.points_against)}</p>

                <p class="small muted">Point Differential</p>
                <div class="score">${formatNumber(team.point_differential)}</div>
            `;

            results.appendChild(card);
        });

    } catch (error) {
        showError();
    }
}

async function loadGames(endpoint, title) {
    document.getElementById("sectionTitle").innerText = "Loading...";
    document.getElementById("resultCount").innerText = "Loading...";
    document.getElementById("results").innerHTML = "";

    try {
        const response = await fetch(API_URL + endpoint);
        const data = await response.json();

        document.getElementById("sectionTitle").innerText = title;
        document.getElementById("resultCount").innerText = data.length + " results";

        const results = document.getElementById("results");
        results.innerHTML = "";

        if (data.length === 0) {
            results.innerHTML = `<p class="muted">No results found.</p>`;
            return;
        }

        data.forEach(game => {
            const totalPoints = game.total_points !== undefined
                ? `<p class="small"><b>Total Points:</b> ${formatNumber(game.total_points)}</p>`
                : "";

            const margin = game.point_margin !== undefined
                ? `<p class="small"><b>Point Margin:</b> ${formatNumber(game.point_margin)}</p>`
                : "";

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${escapeHTML(game.winner)} vs ${escapeHTML(game.loser)}</h3>

                <span class="badge">${escapeHTML(game.season)}</span>
                <span class="badge">Week ${escapeHTML(game.week)}</span>

                <p class="small"><b>Date:</b> ${formatDate(game.game_date)}</p>

                <p class="small muted">Final Score</p>
                <div class="score">
                    ${escapeHTML(game.winner_points)} - ${escapeHTML(game.loser_points)}
                </div>

                <p class="small"><b>Winner Yards:</b> ${formatNumber(game.winner_yards)}</p>
                <p class="small"><b>Loser Yards:</b> ${formatNumber(game.loser_yards)}</p>

                ${totalPoints}
                ${margin}
            `;

            results.appendChild(card);
        });

    } catch (error) {
        showError();
    }
}

function searchTeams() {
    const q = document.getElementById("searchInput").value;

    loadTeams(
        "/teams/search?q=" + encodeURIComponent(q),
        "Team Search Results for: " + q
    );
}

function searchGames() {
    const q = document.getElementById("searchInput").value;

    loadGames(
        "/games/search?q=" + encodeURIComponent(q),
        "Game Search Results for: " + q
    );
}

function showError() {
    document.getElementById("sectionTitle").innerText = "Error";
    document.getElementById("resultCount").innerText = "0 results";

    document.getElementById("results").innerHTML = `
        <div class="error">
            Something went wrong while calling the Node/Express API.
            <br><br>
            Make sure <b>node index.js</b> is running inside the backend folder and check CMD for errors.
        </div>
    `;
}

document.getElementById("searchInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        searchTeams();
    }
});

loadStats();
loadTeams("/teams/top-wins", "Top Teams by Wins");
</script>

</body>
</html>
